<svg width="1200" height="360" viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated space profile scene</title>
  <desc id="desc">A moving space background with planets, satellites, asteroids, meteors, stars, and glowing orbit lines.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#10194a"/>
      <stop offset="48%" stop-color="#070b1f"/>
      <stop offset="100%" stop-color="#03050f"/>
    </radialGradient>
    <radialGradient id="cyanPlanet" cx="32%" cy="28%" r="72%">
      <stop offset="0%" stop-color="#a5f3fc"/>
      <stop offset="35%" stop-color="#22d3ee"/>
      <stop offset="78%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#083344"/>
    </radialGradient>
    <radialGradient id="pinkPlanet" cx="30%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#fbcfe8"/>
      <stop offset="38%" stop-color="#f472b6"/>
      <stop offset="80%" stop-color="#be185d"/>
      <stop offset="100%" stop-color="#500724"/>
    </radialGradient>
    <radialGradient id="greenPlanet" cx="30%" cy="25%" r="75%">
      <stop offset="0%" stop-color="#bbf7d0"/>
      <stop offset="35%" stop-color="#34d399"/>
      <stop offset="80%" stop-color="#047857"/>
      <stop offset="100%" stop-color="#022c22"/>
    </radialGradient>
    <linearGradient id="trail" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect width="1200" height="360" fill="#03050f" opacity="0.22"/>

  <g opacity="0.55">
    <circle cx="70" cy="54" r="1.4" fill="#fff"/>
    <circle cx="150" cy="128" r="1.1" fill="#22d3ee"/>
    <circle cx="240" cy="44" r="1.7" fill="#fff"/>
    <circle cx="355" cy="94" r="1.2" fill="#f472b6"/>
    <circle cx="470" cy="42" r="1.5" fill="#fff"/>
    <circle cx="610" cy="112" r="1.1" fill="#22d3ee"/>
    <circle cx="745" cy="62" r="1.8" fill="#fff"/>
    <circle cx="875" cy="132" r="1.2" fill="#a855f7"/>
    <circle cx="990" cy="50" r="1.4" fill="#fff"/>
    <circle cx="1110" cy="118" r="1.6" fill="#22d3ee"/>
    <circle cx="101" cy="278" r="1.3" fill="#fff"/>
    <circle cx="308" cy="312" r="1.1" fill="#34d399"/>
    <circle cx="520" cy="270" r="1.8" fill="#fff"/>
    <circle cx="765" cy="300" r="1.2" fill="#f472b6"/>
    <circle cx="1045" cy="286" r="1.5" fill="#fff"/>
    <animateTransform attributeName="transform" type="translate" values="0 0; 32 -18; 0 0" dur="18s" repeatCount="indefinite"/>
  </g>

  <g opacity="0.25" fill="none" stroke-width="1">
    <ellipse cx="250" cy="180" rx="210" ry="54" stroke="#22d3ee" transform="rotate(-14 250 180)">
      <animateTransform attributeName="transform" type="rotate" values="-14 250 180; 346 250 180" dur="48s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="910" cy="190" rx="260" ry="68" stroke="#f472b6" transform="rotate(16 910 190)">
      <animateTransform attributeName="transform" type="rotate" values="16 910 190; 376 910 190" dur="64s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <g filter="url(#glow)">
    <g>
      <circle cx="0" cy="0" r="44" fill="url(#cyanPlanet)"/>
      <path d="M-30 -6 C-8 4 14 5 35 -6" fill="none" stroke="#ecfeff" stroke-opacity="0.18" stroke-width="5"/>
      <animateMotion dur="22s" repeatCount="indefinite" path="M102,94 C170,58 250,88 302,132 C232,176 152,154 102,94 Z"/>
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="18s" repeatCount="indefinite" additive="sum"/>
    </g>
    <g>
      <ellipse cx="0" cy="0" rx="78" ry="18" fill="none" stroke="#a855f7" stroke-width="5" opacity="0.38"/>
      <circle cx="0" cy="0" r="32" fill="url(#pinkPlanet)"/>
      <animateMotion dur="27s" repeatCount="indefinite" path="M965,250 C1030,210 1120,220 1160,270 C1086,318 1006,310 965,250 Z"/>
      <animateTransform attributeName="transform" type="rotate" values="-18;342" dur="24s" repeatCount="indefinite" additive="sum"/>
    </g>
    <g>
      <circle cx="0" cy="0" r="26" fill="url(#greenPlanet)"/>
      <animateMotion dur="19s" repeatCount="indefinite" path="M560,285 C620,252 690,265 728,308 C660,342 596,334 560,285 Z"/>
      <animateTransform attributeName="transform" type="rotate" values="0;-360" dur="15s" repeatCount="indefinite" additive="sum"/>
    </g>
  </g>

  <g id="satellite1" opacity="0.82">
    <rect x="-54" y="-14" width="44" height="28" rx="3" fill="#0f3d5e" stroke="#22d3ee" stroke-opacity="0.7"/>
    <rect x="10" y="-14" width="44" height="28" rx="3" fill="#0f3d5e" stroke="#22d3ee" stroke-opacity="0.7"/>
    <rect x="-10" y="-12" width="20" height="24" rx="4" fill="#cbd5e1"/>
    <circle cx="0" cy="0" r="5" fill="#22d3ee"/>
    <path d="M10 -4 Q28 -20 42 -8" fill="none" stroke="#e2e8f0" stroke-width="2"/>
    <line x1="-72" y1="0" x2="-118" y2="0" stroke="url(#trail)" stroke-width="2"/>
    <animateMotion dur="21s" repeatCount="indefinite" path="M-80,88 C240,20 670,68 1280,12"/>
    <animateTransform attributeName="transform" type="rotate" values="-8;8;-8" dur="4s" repeatCount="indefinite" additive="sum"/>
  </g>

  <g id="satellite2" opacity="0.62" transform="scale(.72)">
    <rect x="-54" y="-14" width="44" height="28" rx="3" fill="#182554" stroke="#a855f7" stroke-opacity="0.65"/>
    <rect x="10" y="-14" width="44" height="28" rx="3" fill="#182554" stroke="#a855f7" stroke-opacity="0.65"/>
    <rect x="-10" y="-12" width="20" height="24" rx="4" fill="#cbd5e1"/>
    <circle cx="0" cy="0" r="5" fill="#f472b6"/>
    <path d="M10 -4 Q28 -20 42 -8" fill="none" stroke="#e2e8f0" stroke-width="2"/>
    <line x1="-72" y1="0" x2="-130" y2="0" stroke="url(#trail)" stroke-width="2"/>
    <animateMotion dur="28s" repeatCount="indefinite" path="M-100,288 C360,228 780,318 1300,238"/>
    <animateTransform attributeName="transform" type="rotate" values="10;-10;10" dur="5s" repeatCount="indefinite" additive="sum"/>
  </g>

  <g fill="#64748b" stroke="#cbd5e1" stroke-opacity="0.18">
    <path d="M0 -9 L11 -3 L8 10 L-7 12 L-14 2 Z">
      <animateMotion dur="18s" repeatCount="indefinite" path="M175,230 C270,190 390,206 510,164"/>
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="5s" repeatCount="indefinite" additive="sum"/>
    </path>
    <path d="M0 -13 L15 -4 L11 13 L-10 10 L-18 -2 Z" opacity="0.8">
      <animateMotion dur="24s" repeatCount="indefinite" path="M720,82 C800,126 884,104 1036,156"/>
      <animateTransform attributeName="transform" type="rotate" values="0;-360" dur="6s" repeatCount="indefinite" additive="sum"/>
    </path>
    <path d="M0 -7 L9 -2 L6 8 L-8 7 L-11 -3 Z" opacity="0.75">
      <animateMotion dur="16s" repeatCount="indefinite" path="M430,314 C520,278 650,300 770,250"/>
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="4s" repeatCount="indefinite" additive="sum"/>
    </path>
  </g>

  <g filter="url(#glow)">
    <g>
      <line x1="-150" y1="0" x2="0" y2="0" stroke="url(#trail)" stroke-width="3"/>
      <circle cx="0" cy="0" r="4" fill="#fefce8"/>
      <animateMotion dur="7s" repeatCount="indefinite" path="M-80,70 L1280,-30"/>
    </g>
    <g opacity="0.8">
      <line x1="-120" y1="0" x2="0" y2="0" stroke="url(#trail)" stroke-width="2"/>
      <circle cx="0" cy="0" r="3" fill="#fff"/>
      <animateMotion dur="9s" repeatCount="indefinite" path="M-90,240 L1290,102"/>
    </g>
    <g opacity="0.7">
      <line x1="-100" y1="0" x2="0" y2="0" stroke="url(#trail)" stroke-width="2"/>
      <circle cx="0" cy="0" r="3" fill="#fff"/>
      <animateMotion dur="11s" repeatCount="indefinite" path="M-110,340 L1280,190"/>
    </g>
  </g>
</svg>
